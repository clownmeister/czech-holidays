<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Czech Holidays Calendar</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Czech Holidays</h1>
      <p class="subtitle">Interactive calendar powered by <a href="https://www.npmjs.com/package/@clownmeister/czech-holidays" target="_blank">@clownmeister/czech-holidays</a></p>
    </header>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="layout">
      <main>
        <div class="calendar-header">
          <button id="prev-month" aria-label="Previous month">&larr;</button>
          <h2 id="month-title"></h2>
          <button id="next-month" aria-label="Next month">&rarr;</button>
        </div>
        <div class="calendar-grid">
          <div class="weekday-header">Mo</div>
          <div class="weekday-header">Tu</div>
          <div class="weekday-header">We</div>
          <div class="weekday-header">Th</div>
          <div class="weekday-header">Fr</div>
          <div class="weekday-header weekend-header">Sa</div>
          <div class="weekday-header weekend-header">Su</div>
          <div id="calendar-cells"></div>
        </div>
        <div class="legend">
          <span class="legend-item"><span class="dot dot-today"></span> Today</span>
          <span class="legend-item"><span class="dot dot-holiday"></span> Holiday</span>
          <span class="legend-item"><span class="dot dot-bridge"></span> Bridge day</span>
          <span class="legend-item"><span class="dot dot-weekend"></span> Weekend</span>
          <span class="legend-item"><span class="dot dot-shops-closed"></span> Shops closed</span>
          <span class="legend-item"><span class="dot dot-shops-partial"></span> Shops restricted</span>
        </div>
      </main>

      <aside>
        <div class="panel" id="next-holiday-panel">
          <h3>Next holiday</h3>
          <div id="next-holiday-content"></div>
        </div>

        <div class="panel" id="month-holidays-panel">
          <h3>Holidays this month</h3>
          <div id="month-holidays-list"></div>
        </div>

        <div class="panel" id="long-weekends-panel">
          <h3>Long weekends this year</h3>
          <div id="long-weekends-list"></div>
        </div>

        <div class="panel" id="bridge-days-panel">
          <h3>Bridge days this year</h3>
          <p class="panel-hint">Take 1 day off, get a longer break</p>
          <div id="bridge-days-list"></div>
        </div>
      </aside>
    </div>

    <footer>
      <a href="https://github.com/clownmeister/czech-holidays" target="_blank">GitHub</a>
      <a href="https://www.npmjs.com/package/@clownmeister/czech-holidays" target="_blank">npm</a>
    </footer>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
